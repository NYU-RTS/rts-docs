name: Vale Test

on:
  pull_request:
  workflow_dispatch:

jobs:
  vale:
    name: Vale Grammar and Style Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create Vale config
        run: |
          cat > .vale.ini <<EOF
          StylesPath = styles

          [formats]
          mdx = md

          [*.{md,mdx}]
          BasedOnStyles = Vale
          EOF

      - name: Run Vale
        uses: errata-ai/vale-action@v2
        with:
          version: 3.12.0
          files: |
            docs/
            src/pages/
