name: Vale Test

on:
  pull_request:
  workflow_dispatch:

jobs:
  vale:
    name: Vale Grammar and Style Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Vale
        uses: vale-cli/vale-action@v2
        with:
          version: 3.12.0
          files: |
            docs/
            src/pages/
      - name: Debug Vale paths
        run: |
          echo "Current directory:"
          pwd

          echo "Files:"
          find config -maxdepth 3 -print || true
          echo "Vocab directory:"
          ls -la config/vocabularies || true
          ls -la config/vocabularies/RTS || true

          echo "Vale config:"
          cat .vale.ini
