name: Docs Quality

on:
  pull_request:
    paths:
      - "docs/**/*.md"
      - "_typos.toml"
      - ".github/workflows/docs-quality.yml"
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  typos:
    name: Spelling (typos-cli)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crate-ci/typos@master

  harper:
    name: Grammar & headings (Harper)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Cache harper-cli binary
        id: cache-harper
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/harper-cli
          key: harper-cli-${{ runner.os }}-v1

      - name: Install harper-cli
        if: steps.cache-harper.outputs.cache-hit != 'true'
        run: cargo install --locked --git https://github.com/Automattic/harper.git harper-cli

      - name: Lint docs with Harper (spellcheck off)
        run: |
          set -uo pipefail
          status=0
          while IFS= read -r -d '' file; do
            echo "::group::$file"
            if ! harper-cli lint --ignore SpellCheck "$file"; then
              status=1
            fi
            echo "::endgroup::"
          done < <(find docs -name '*.md' -print0)
          exit $status
