name: Docs Quality

on:
  pull_request:
    paths:
      - "docs/**/*.md"
      - "docs/**/*.mdx"
      - "_typos.toml"
      - ".github/workflows/docs-quality.yml"
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  typos:
    name: Spelling (typos-cli)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crate-ci/typos@master

  harper:
    name: Grammar & headings (Harper)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Cache harper-cli binary
        id: cache-harper
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/harper-cli
          key: harper-cli-${{ runner.os }}-v1

      - name: Install harper-cli
        if: steps.cache-harper.outputs.cache-hit != 'true'
        run: cargo install --locked --git https://github.com/Automattic/harper.git harper-cli

      - name: Lint docs with Harper (spellcheck off)
        run: |
          set -uo pipefail
          out="$(mktemp)"
          total=0
          bad=0
          while IFS= read -r -d '' file; do
            total=$((total+1))
            echo "::group::$file"
            if harper-cli lint --ignore SpellCheck "$file" 2>&1 | tee -a "$out"; then
              :
            else
              bad=$((bad+1))
            fi
            echo "::endgroup::"
          done < <(find docs \( -name '*.md' -o -name '*.mdx' \) -print0)
          titlecase=$(grep -c 'UseTitleCase' "$out" || true)
          {
            echo "### Harper summary"
            echo "- Files scanned: $total"
            echo "- Files with issues: $bad"
            echo "- Heading (UseTitleCase) violations: $titlecase"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "== Harper: $bad/$total files with issues; $titlecase heading (UseTitleCase) violations =="
          [ "$bad" -eq 0 ]
