name: Docs Quality
on:
  pull_request:
  workflow_dispatch:
jobs:
  typos:
    name: Spelling (typos-cli)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: crate-ci/typos@master

  harper:
    name: Grammar and Style Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Restore Harper CLI cache
        id: cache-harper
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/bin/harper-cli
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-harper-cli
          restore-keys: |
            ${{ runner.os }}-harper-cli
      - name: Report cache status
        run: |
          echo "cache-hit output: '${{ steps.cache-harper.outputs.cache-hit }}'"
          ls -la ~/.cargo/bin/ 2>&1 || echo "~/.cargo/bin does not exist"
          if [ -x ~/.cargo/bin/harper-cli ]; then
            echo "RESULT: harper-cli binary present and executable"
            ~/.cargo/bin/harper-cli --version || true
          else
            echo "RESULT: harper-cli binary NOT present -- full reinstall will run"
          fi
      - name: Install Harper CLI
        if: steps.cache-harper.outputs.cache-hit != 'true'
        run: cargo install --locked --git https://github.com/Automattic/harper.git harper-cli
      - name: Lint docs with Harper
        run: |
          set -uo pipefail
          ONLY_RULES=(
            UseTitleCase
            RepeatedWords
          )
          ONLY_ARG="--only $(IFS=,; echo "${ONLY_RULES[*]}")"
          rules_seen="$(mktemp)"
          total=0
          bad=0
          while IFS= read -r -d '' file; do
            total=$((total+1))
            echo "::group::$file"
            json_out="$(harper-cli lint $ONLY_ARG --format json "$file" 2>/dev/null)"
            lint_count=$(printf '%s' "$json_out" | python3 -c "import json,sys;d=json.load(sys.stdin);print(sum(len(f.get('lints',[])) for f in d))" 2>/dev/null)
            if [ "${lint_count:-0}" -gt 0 ]; then
              bad=$((bad+1))
              printf '%s' "$json_out" | python3 -c "import json,sys;d=json.load(sys.stdin);[print(l.get('rule','?'), file=sys.stderr) or print('['+l.get('rule','?')+'] '+l.get('message','')+(('  -> should be: '+str(l.get('suggestions')[0])) if l.get('suggestions') else '')) for f in d for l in f.get('lints',[])]" 2>>"$rules_seen"
            else
              echo "no issues"
            fi
            echo "::endgroup::"
          done < <(
            find docs src/pages \
              -type f \( -name "*.md" -o -name "*.mdx" \) \
              -print0 2>/dev/null
          )
          {
            echo "### Harper summary"
            echo "- Files scanned: $total"
            echo "- Files with issues: $bad"
            echo ""
            echo "### Violations by rule"
            echo '```'
            sort "$rules_seen" | uniq -c | sort -rn || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          echo "== Harper: $bad/$total files with issues =="
          [ "$bad" -eq 0 ]

      - name: Save Harper CLI cache
        if: always() && steps.cache-harper.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/bin/harper-cli
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-harper-cli
